<label class:inline class:block="{not inline}" class:required class:error="!@error">
    <span css:width="{caption_width}">{{caption}}</span>
    <input
            set:id
            set:name
            set:type
            bind:value
            set:placeholder
            set:required
            set:disabled="@readonly"
            css:width
            spellcheck = "{spellcheck and '' or 'false'}"
    >
    <HelpMessage consume="help">
        <section name="help" reuse/>
    </HelpMessage>
    <div class="message">!{{error}}</div>
</label>

<python use="inputs">
from pantra.ctx import *

id: Property[str] = ''
name: Property[str] = ''
inline: Property[bool] = False
type: Property[str] = 'text'
placeholder: Property[str] = ''
caption_width: Property[int] = ''
width: Property[str] = ''
spellcheck: Property[bool] = True
</python>
